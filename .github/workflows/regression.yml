name: regression

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'   # daily 18:00 UTC nightly (slow)
    - cron: '0 20 * * 0'   # weekly Sun 20:00 UTC (long)
  workflow_dispatch:
    inputs:
      markers:
        description: 'pytest marker expression'
        required: false
        default: 'fast'

jobs:
  fast:
    name: regression-fast
    if: github.event_name == 'pull_request' || github.event.inputs.markers == 'fast'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy h5py pytest python-box pyyaml matplotlib
          # mnpbem from sibling repo if needed (placeholder)
          if [ -d "../MNPBEM" ]; then pip install -e ../MNPBEM || true; fi
          pip install -e .

      - name: Run regression-fast
        run: |
          python -m pytest tests/regression/ -m fast --tb=short -q

  slow:
    name: regression-slow (nightly)
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy h5py pytest python-box pyyaml matplotlib
          if [ -d "../MNPBEM" ]; then pip install -e ../MNPBEM || true; fi
          pip install -e .

      - name: Run regression-slow
        run: |
          python tests/regression/runners/run_full_regression.py \
              --markers "fast or slow" \
              --json artifacts/regression_summary.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-summary-nightly
          path: artifacts/regression_summary.json

  long:
    name: regression-long (weekly)
    if: github.event_name == 'schedule' && github.event.schedule == '0 20 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy h5py pytest python-box pyyaml matplotlib
          if [ -d "../MNPBEM" ]; then pip install -e ../MNPBEM || true; fi
          pip install -e .

      - name: Run regression-long
        run: |
          python tests/regression/runners/run_full_regression.py \
              --markers "fast or slow or long" \
              --json artifacts/regression_summary.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-summary-weekly
          path: artifacts/regression_summary.json
