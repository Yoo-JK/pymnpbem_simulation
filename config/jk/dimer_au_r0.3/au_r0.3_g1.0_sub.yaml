  - [0, 1, 0]
  propagation_dirs:
  - [0, 0, 1]
  - [0, 0, 1]
  wavelength_range: [500, 1000, 100]
  relcutoff: 3
  calculate_cross_sections: true
  calculate_fields: false
  field_region:
    x_range: [-80, 80, 161]
    y_range: [0, 0, 1]
    z_range: [-80, 80, 161]
  field_mindist: 0.5
  field_nmax: 2000
  field_wavelength_idx: [568, 671, 740, 760, 552, 667, 722, 751]
  export_field_arrays: false
  field_hotspot_count: 10
  field_hotspot_min_distance: 3
  enei_min: 500
  enei_max: 1000
  n_wavelengths: 100
postprocess: {spectrum_xaxis: energy, run_eigenmode_analysis: true}
