output:
  name: au_r0.3_g1.0_sub
  dir: /home/yoojk20/research/pymnpbem/au_dimer/sub
  formats: [json, npz, png]
  save_plots: true
  plot_format: [png, pdf]
  plot_dpi: 300
structure:
  type: advanced_dimer_cube
  core_size: 47
  shell_layers: []
  roundings: [0.3]
  mesh_density: 2
  gap: 1
  offset: [0, 0, 0]
  tilt_angle: 0
  tilt_axis: [1, 0, 0]
  rotation_angle: 0
  refine: 3
materials:
  particle_list: [gold]
  medium: water
  refractive_index_paths:
    agcl: {type: constant, epsilon: 2.02}
