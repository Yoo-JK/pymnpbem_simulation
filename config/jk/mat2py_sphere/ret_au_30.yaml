output:
  name: sphere_30nm
  dir: ./results
  formats: [json, npz, png]
  save_plots: true
  plot_format: [png, pdf]
  plot_dpi: 300
structure: {type: sphere, diameter: 30, mesh_density: 144, refine: 3}
materials:
  particle_list: [gold]
  medium: air
  refractive_index_paths: {}
  use_substrate: false
  particle: gold
compute: {use_parallel: false, n_workers: 2, n_threads: 64, wavelength_chunk_size: 10,
  mirror: false, iterative: false, nonlocal: false, n_gpus_per_worker: 0, multi_node: false,
  hmode: dense}
simulation:
  type: ret
  interp: curv
  waitbar: 0
  excitation: planewave
  polarizations:
  - [1, 0, 0]
  - [0, 1, 0]
  propagation_dirs:
  - [0, 0, 1]
  - [0, 0, 1]
  wavelength_range: [400, 800, 100]
  relcutoff: 3
  calculate_cross_sections: true
  calculate_fields: true
  field_region:
    x_range: [-80, 80, 161]
    y_range: [0, 0, 1]
    z_range: [-80, 80, 161]
  field_mindist: 0.5
  field_nmax: 2000
  field_wavelength_idx: peak
  export_field_arrays: false
  field_hotspot_count: 10
  field_hotspot_min_distance: 3
  enei_min: 400
  enei_max: 800
  n_wavelengths: 100
postprocess: {spectrum_xaxis: energy, run_eigenmode_analysis: false}
