output:
  name: contact/ctab
  dir: ./results
  formats: [npz, json, png]
  save_plots: true
  plot_format: [png]
  plot_dpi: 300
structure:
  type: with_substrate
  base: {type: core_shell_rod, refine: 3, core_diameter: 20, shell_thickness: 3.5,
    height: 67, nphi: 3, ntheta: 3, nz: 3}
  substrate: {eps: 2.25, z_position: -13.501, z_shift: 1.0}
materials:
  particle_list: [gold_olmon, ctab]
  medium: vacuum
  refractive_index_paths:
    gold_olmon: /home/yoojk20/dataset/mnpbem/refrac/gold_olmon.dat
    ctab: {type: constant, epsilon: 2.0736}
  core: /home/yoojk20/dataset/mnpbem/refrac/gold_olmon.dat
  shell: silver
  particle: /home/yoojk20/dataset/mnpbem/refrac/gold_olmon.dat
compute: {use_parallel: true, n_workers: 4, mirror: false, iterative: false, nonlocal: false,
  n_threads: 1, n_gpus_per_worker: 0, multi_node: false, hmode: dense}
simulation:
  type: ret_layer
  interp: curv
  waitbar: 1
  excitation: planewave
  polarizations:
  - [1, 0, 0]
  - [0, 1, 0]
  propagation_dirs:
  - [0, 0, 1]
  - [0, 0, 1]
  wavelength_range: [400, 1000, 300]
  relcutoff: 3
  calculate_cross_sections: true
  enei_min: 400
  enei_max: 1000
  n_wavelengths: 300
postprocess: {spectrum_xaxis: wavelength, run_eigenmode_analysis: false}
