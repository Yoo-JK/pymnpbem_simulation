output:
  name: ag_r0.2
  dir: /home/yoojk20/research/pymnpbem/monomer
  formats: [json, npz, png]
  save_plots: true
  plot_format: [png, pdf]
  plot_dpi: 300
structure:
  type: advanced_monomer_cube
  core_size: 51
  shell_layers: []
  roundings: [0.2]
  mesh_density: 2
  refine: 3
  n_per_edge: 26
materials:
  particle_list: [silver]
  medium: water
  refractive_index_paths:
    agcl: {type: constant, epsilon: 2.02}
  use_substrate: false
  particle: silver
compute: {use_parallel: true, n_workers: 4, n_threads: 1, wavelength_chunk_size: 10,
  mirror: false, iterative: true, nonlocal: false, n_gpus_per_worker: 0, multi_node: false,
  hmode: dense}
simulation:
  type: ret
  interp: curv
  waitbar: 1
  excitation: planewave
  polarizations:
  - [1, 0, 0]
  - [0, 1, 0]
  propagation_dirs:
  - [0, 0, 1]
  - [0, 0, 1]
  wavelength_range: [300, 1000, 100]
  relcutoff: 3
  calculate_cross_sections: true
  calculate_fields: false
  field_region:
    x_range: [-80, 80, 161]
    y_range: [0, 0, 1]
    z_range: [-80, 80, 161]
  field_mindist: 0.5
  field_nmax: 2000
  field_wavelength_idx: peak
  export_field_arrays: false
  field_hotspot_count: 10
  field_hotspot_min_distance: 3
  enei_min: 300
  enei_max: 1000
  n_wavelengths: 100
postprocess: {spectrum_xaxis: energy, run_eigenmode_analysis: true}
