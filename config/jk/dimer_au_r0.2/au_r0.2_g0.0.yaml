output:
  name: au_r0.2_g0.0
  dir: ./results
  formats: [npz, json, png]
  save_plots: true
  plot_format: [png]
  plot_dpi: 300
structure:
  type: connected_dimer_cube
  core_size: 47
  gap: -0.1
  rounding: 0.2
  mesh_density: 2
  offset: [0, 0, 0]
  tilt_angle: 0
  tilt_axis: [1, 0, 0]
  rotation_angle: 0
  refine: 3
  n_per_edge: 24
materials:
  particle_list: [gold]
  medium: water
  refractive_index_paths: {}
  use_substrate: false
  particle: gold
compute: {use_parallel: true, n_workers: 4, n_threads: 1, wavelength_chunk_size: 10,
  mirror: false, iterative: true, nonlocal: false, n_gpus_per_worker: 0, multi_node: false,
  hmode: dense}
simulation:
  type: field
  interp: curv
  waitbar: 1
  excitation: planewave
  polarizations:
  - [1, 0, 0]
  - [0, 1, 0]
  propagation_dirs:
  - [0, 0, 1]
  - [0, 0, 1]
  wavelength_range: [500, 1000, 100]
  relcutoff: 3
  calculate_cross_sections: false
  calculate_fields: true
  field_mindist: 0.5
  field_nmax: 2000
  field_wavelength_idx: [553, 568, 663, 684, 687, 717, 728, 796, 816, 825, 972, 990]
  export_field_arrays: false
  field_hotspot_count: 10
  field_hotspot_min_distance: 3
  enei_min: 500
  enei_max: 1000
  n_wavelengths: 100
  original_type: ret
  grid:
    type: rectangular
    x_range: [-80.0, 80.0]
    y_range: [0.0, 0.0]
    z_range: [-80.0, 80.0]
    n_points: [161, 1, 161]
  mindist: 0.5
  nmax: 2000
postprocess: {spectrum_xaxis: energy, run_eigenmode_analysis: true}
