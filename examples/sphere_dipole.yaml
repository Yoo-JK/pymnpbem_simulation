structure:
  type: sphere
  diameter: 50.0
  mesh_density: 144
  refine: 2
  interp: curv

simulation:
  type: ret
  excitation: dipole
  enei_min: 500
  enei_max: 800
  n_wavelengths: 10
  dipole:
    position: [40.0, 0.0, 0.0]
    orientation: [1, 0, 0]
    medium: 1

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: sphere_dipole
  formats:
    - npz
    - json
  save_plots: true

postprocess:
  spectrum_xaxis: wavelength
  run_eigenmode_analysis: false
