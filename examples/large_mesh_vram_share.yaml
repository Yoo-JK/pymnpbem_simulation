# 25k+ face dimer with v1.2.0 VRAM-share multi-GPU LU factorisation.
#
# A single GPU's VRAM (e.g. 24 GB on RTX 4090) cannot hold the dense
# BEMRet system matrix for 25k+ faces (16-byte complex entries -> ~80 GB
# at 25k faces). v1.2.0 VRAM share pools 2+ GPUs into a single LU pass
# via cuSolverMg / Magma / NCCL, so the simulation that would otherwise
# OOM completes on a single node with multi-GPU memory pooling.
#
# Activated by ``compute.n_gpus_per_worker > 1`` (was an explicit
# NotImplementedError before v1.2.0). The wrapper sets
# MNPBEM_VRAM_SHARE_GPUS=N and the chosen backend automatically.

structure:
  type: dimer_cube
  edge: 80.0                  # large cubes for 25k+ face mesh
  gap: 0.6
  n_per_edge: 32              # mesh density (32^2 * 6 ~ 6k per cube before refine)
  e: 0.2
  refine: 4                   # refine ~4x -> ~25k faces total
  interp: curv

simulation:
  type: ret
  excitation: planewave
  enei_min: 600
  enei_max: 1100
  n_wavelengths: 51
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, 1]
    - [0, 0, 1]

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1                # single worker, big LU
  n_threads: 8
  n_gpus_per_worker: 2        # >=2 triggers VRAM-share dispatch
  multi_node: false
  hmode: dense
  # v1.2.0: backend for the multi-GPU LU. Options:
  #   cusolvermg (default, NVIDIA)
  #   magma      (open-source MAGMA)
  #   nccl       (collective-based partitioning)
  vram_share_backend: cusolvermg

output:
  dir: ./results
  name: large_mesh_vram_share
  formats: [npz, json, png]
  save_plots: true

postprocess:
  spectrum_xaxis: energy
  run_eigenmode_analysis: false
