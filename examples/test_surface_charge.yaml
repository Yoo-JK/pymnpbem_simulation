structure:
  type: dimer_cube
  edge: 47.0
  gap: 0.6
  n_per_edge: 8
  e: 0.2
  refine: 0
  interp: curv

simulation:
  type: ret
  excitation: planewave
  enei_min: 600
  enei_max: 700
  n_wavelengths: 5
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, 1]
    - [0, 0, 1]
  interp: curv
  field_wavelength_idx: [650]
  calculate_surface_charge: true
  surface_charge_wavelength_tol: 30

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 2
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: test_surface_charge
  formats:
    - npz
    - json
    - png
  save_plots: true
  plot_format: [png]
  plot_dpi: 150

postprocess:
  spectrum_xaxis: wavelength
  run_eigenmode_analysis: false
