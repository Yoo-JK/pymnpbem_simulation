structure:
  type: with_nonlocal
  base:
    type: sphere
    diameter: 20.0
    mesh_density: 144
    refine: 2
    interp: curv
  nonlocal:
    metal: gold
    beta: null
    k_nm_inv: 0.0

simulation:
  type: ret
  excitation: planewave
  enei_min: 480
  enei_max: 700
  n_wavelengths: 11
  polarizations:
    - [1, 0, 0]
  propagation_dirs:
    - [0, 0, 1]

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: sphere_nonlocal
  formats: [npz, json]
  save_plots: false

postprocess:
  spectrum_xaxis: energy
  run_eigenmode_analysis: false
