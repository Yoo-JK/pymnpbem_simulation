structure:
  type: with_substrate
  base:
    type: sphere
    diameter: 80.0
    mesh_density: 144
    refine: 2
    interp: curv
  substrate:
    eps: 2.25
    z_position: 0.0
    z_shift: 1.0

simulation:
  type: ret_layer
  excitation: eels
  impact: [[55.0, 0.0]]               # nm offset from particle center
  beam_width: 0.5                     # nm
  beam_energy_kev: 200                # 200 keV electron
  enei_min: 350                       # nm wavelength
  enei_max: 700
  n_wavelengths: 11

materials:
  medium: vacuum
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: eels_substrate
  formats:
    - npz
    - json
    - png
  save_plots: true

postprocess:
  spectrum_xaxis: wavelength
  run_eigenmode_analysis: false
