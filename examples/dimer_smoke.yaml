structure:
  type: dimer_cube
  edge: 47.0
  gap: 0.6
  n_per_edge: 8
  e: 0.2
  refine: 1
  interp: curv

simulation:
  type: ret
  excitation: planewave
  enei_min: 500
  enei_max: 1000
  n_wavelengths: 4
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, 1]
    - [0, 0, 1]
  interp: curv

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 1
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: dimer_smoke
  formats:
    - npz
    - json
    - png
  save_plots: false

postprocess:
  spectrum_xaxis: energy
  run_eigenmode_analysis: false
