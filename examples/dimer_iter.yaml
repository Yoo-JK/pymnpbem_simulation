structure:
  type: dimer_sphere
  diameter: 30.0
  gap: 5.0
  n_verts: 60
  refine: 2
  interp: curv

simulation:
  type: ret_iter
  excitation: planewave
  enei_min: 500
  enei_max: 800
  n_wavelengths: 6
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, 1]
    - [0, 0, 1]
  iter:
    solver: gmres
    tol: 1.0e-6
    maxit: 200
    precond: hmat
    output: 0
    hmatrix: false

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: dimer_iter
  formats: [npz, json]
  save_plots: false

postprocess:
  spectrum_xaxis: energy
  run_eigenmode_analysis: false
