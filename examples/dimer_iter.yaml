# Small (~600 face) dimer iter smoke. With `hmatrix: auto` (the v1.3.0
# default) this stays on dense Green functions because face count is
# below the 5000 threshold. See `dimer_iter_hmatrix.yaml` for an
# explicit-ON variant and `large_mesh_hmatrix.yaml` for a 25k face
# auto-ON case.

structure:
  type: dimer_sphere
  diameter: 30.0
  gap: 5.0
  n_verts: 60
  refine: 2
  interp: curv

simulation:
  type: ret_iter
  excitation: planewave
  enei_min: 500
  enei_max: 800
  n_wavelengths: 6
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, 1]
    - [0, 0, 1]
  iter:
    solver: gmres
    tol: 1.0e-6
    maxit: 200
    precond: hmat
    output: 0
    hmatrix: auto       # v1.3.0: auto stays dense below 5000 faces

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: dimer_iter
  formats: [npz, json]
  save_plots: false

postprocess:
  spectrum_xaxis: energy
  run_eigenmode_analysis: false
