structure:
  type: with_mirror
  base:
    type: sphere
    diameter: 30.0
    mesh_density: 144
    refine: 2
    interp: curv
  mirror:
    sym: xy

simulation:
  type: ret
  excitation: planewave
  enei_min: 500
  enei_max: 800
  n_wavelengths: 11
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, 1]
    - [0, 0, 1]
  interp: curv

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: sphere_with_mirror
  formats: [npz, json]
  save_plots: false

postprocess:
  spectrum_xaxis: energy
  run_eigenmode_analysis: false
