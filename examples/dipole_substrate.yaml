structure:
  type: with_substrate
  base:
    type: sphere
    diameter: 20.0
    mesh_density: 144
    refine: 2
    interp: curv
  substrate:
    eps: 2.25         # n=1.5 glass
    gap: 0.001        # touching

simulation:
  type: ret_layer
  excitation: dipole
  dipole_position: [0.0, 0.0, 25.0]
  dipole_moment: [0.0, 0.0, 1.0]      # z-oriented dipole
  enei_min: 500
  enei_max: 700
  n_wavelengths: 11

materials:
  medium: vacuum
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: dipole_substrate
  formats:
    - npz
    - json
    - png
  save_plots: true

postprocess:
  spectrum_xaxis: wavelength
  run_eigenmode_analysis: false
