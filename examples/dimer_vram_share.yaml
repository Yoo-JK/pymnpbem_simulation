# Au dimer-cube (water medium) with v1.2.0 VRAM-share LU dispatch.
#
# Activated by ``compute.n_gpus_per_worker > 1`` (was an explicit
# NotImplementedError before v1.2.0; the M2 stub merely reserved the
# config schema). The wrapper now sets MNPBEM_VRAM_SHARE=1 and routes
# the BEM solve through the multi-GPU LU partitioning backend.
#
# This example is intentionally smaller than ``large_mesh_vram_share``
# so it doubles as a smoke test for the dispatch-level wiring.

structure:
  type: dimer_cube
  edge: 47.0
  gap: 0.6
  n_per_edge: 24
  e: 0.2
  refine: 3
  interp: curv

simulation:
  type: ret
  excitation: planewave
  enei_min: 500
  enei_max: 1000
  n_wavelengths: 100
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, 1]
    - [0, 0, 1]
  interp: curv

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 4        # v1.2.0: >=2 routes to _dispatch_vram_share
  multi_node: false
  hmode: dense
  vram_share_backend: cusolvermg

output:
  dir: ./results
  name: dimer_vram_share
  formats:
    - npz
    - json
    - png
  save_plots: true

postprocess:
  spectrum_xaxis: energy
  run_eigenmode_analysis: false
