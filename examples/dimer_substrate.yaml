structure:
  type: with_substrate
  base:
    type: dimer_cube
    edge: 30.0
    gap: 1.0
    n_per_edge: 12
    e: 0.2
    refine: 2
    interp: curv
  substrate:
    eps: 2.25         # n=1.5 glass
    gap: 0.001        # touching

simulation:
  type: ret_layer
  excitation: planewave
  enei_min: 500
  enei_max: 800
  n_wavelengths: 11
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]
  propagation_dirs:
    - [0, 0, -1]
    - [0, 0, -1]
  tab_n: 5

materials:
  medium: vacuum
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: dimer_substrate
  formats:
    - npz
    - json
    - png
  save_plots: true

postprocess:
  spectrum_xaxis: wavelength
  run_eigenmode_analysis: false
