structure:
  type: sphere
  diameter: 30.0
  mesh_density: 144
  refine: 2
  interp: curv

simulation:
  type: stat
  excitation: planewave
  enei_min: 500
  enei_max: 700
  n_wavelengths: 5
  polarizations:
    - [1, 0, 0]
    - [0, 1, 0]

materials:
  medium: water
  particle: gold

compute:
  n_workers: 1
  n_threads: 2
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: sphere_planewave_stat
  formats:
    - npz
    - json
  save_plots: false

postprocess:
  run_eigenmode_analysis: false
