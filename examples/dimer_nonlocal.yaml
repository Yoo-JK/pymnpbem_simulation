# Nano-gap gold dimer with hydrodynamic-Drude nonlocal cover layer.
# Yu Luo / Pendry et al., PRL 111, 093901 (2013). Compares to a local-Drude
# dimer to expose the bonding-mode blueshift expected at sub-nm gaps.

structure:
  type: with_nonlocal
  base:
    type: dimer_sphere
    diameter: 10.0          # each sphere core (nm)
    gap: 1.0                # core-to-core gap (nm) — sub-nm regime
    n_verts: 144
    interp: curv
  nonlocal:
    metal: gold
    delta_d: 0.05           # cover-layer thickness (nm)
    beta: null              # default sqrt(3/5)*v_F*hbar -> ~0.714 eV*nm for Au
    eps_embed: 1.0

simulation:
  # nonlocal requires stat solver (BEMStat + coverlayer.refine refun)
  type: stat
  excitation: planewave
  enei_min: 400
  enei_max: 800
  n_wavelengths: 41
  polarizations:
    - [1, 0, 0]             # bonding mode (axial polarization, x = dimer axis)

materials:
  medium: vacuum
  particle: gold

compute:
  n_workers: 1
  n_threads: 4
  n_gpus_per_worker: 0
  multi_node: false
  hmode: dense

output:
  dir: ./results
  name: dimer_nonlocal
  formats: [npz, json]
  save_plots: false

postprocess:
  spectrum_xaxis: wavelength
  run_eigenmode_analysis: false
